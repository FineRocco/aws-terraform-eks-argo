name: Destroy Infrastructure

on:
  workflow_dispatch: 

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init

      - name: Clean up Kubernetes Resources (Delete Load Balancers)
        working-directory: ./env/dev
        run: |
          CLUSTER_NAME=$(terraform output -raw eks_cluster_name)
          aws eks update-kubeconfig --region eu-west-1 --name "$CLUSTER_NAME"
          
          echo "Deleting ArgoCD App to trigger Load Balancer cleanup..."
          kubectl delete -f ../../k8s/argocd-app.yaml --ignore-not-found=true
          kubectl delete svc flask-app-service --ignore-not-found=true
          
          echo "Sleeping for 120s to ensure AWS ENIs are detached..."
          sleep 120

      - name: Terraform Destroy
        working-directory: ./env/dev
        run: terraform destroy -auto-approve -no-color